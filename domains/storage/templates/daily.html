<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>{title}</title>
<style>
  *{{margin:0;padding:0;box-sizing:border-box}}
  body{{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#f6f7f9;color:#1a1a1a;max-width:760px;margin:0 auto;padding:0}}
  .header{{background:#0f172a;color:#fff;padding:28px 32px 22px}}
  .header h1{{font-size:21px;font-weight:700;margin-bottom:6px}}
  .header .date{{font-size:13px;color:#94a3b8}}
  .content{{padding:28px 32px 42px;background:#fff}}
  .summary{{background:#eef6ff;border:1px solid #bfd7f3;border-radius:8px;padding:16px 18px;margin-bottom:26px}}
  .summary p{{font-size:15px;line-height:1.85;color:#1e3a5f;margin:0}}
  hr{{border:none;border-top:1px solid #e1e6ee;margin:24px 0}}
  .item{{margin-bottom:20px;padding:0 0 18px;border-bottom:1px solid #edf1f5}}
  .item:last-of-type{{border-bottom:none}}
  .item.edge-signal{{background:#fbfcfe;border:1px solid #e5eaf0;border-left:3px solid #64748b;border-radius:8px;padding:14px 16px 12px;margin-bottom:14px}}
  .item .num{{display:inline-block;width:25px;height:25px;line-height:25px;text-align:center;background:#1f3b57;color:#fff;font-size:12px;font-weight:700;border-radius:4px;margin-right:10px;vertical-align:middle}}
  .item.edge-signal .num{{background:#64748b}}
  .item .tag{{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:650;letter-spacing:0;margin-left:7px;vertical-align:middle;text-transform:uppercase}}
  .tag-new{{background:#dcfce7;color:#166534}}
  .tag-tech{{background:#fef3c7;color:#92400e}}
  .tag-supply{{background:#f3e8ff;color:#6b21a8}}
  .tag-price{{background:#fce7f3;color:#9d174d}}
  .tag-edge{{background:#e2e8f0;color:#334155}}
  .item h3{{font-size:15.5px;font-weight:700;color:#0f172a;margin-bottom:9px;line-height:1.5}}
  .item.edge-signal h3{{font-size:14.5px;color:#273548}}
  .item p{{font-size:14px;line-height:1.78;color:#334155;margin-bottom:7px}}
  .item.edge-signal p{{font-size:13.5px;color:#475569}}
  .item .source{{font-size:11px;color:#94a3b8}}
  .major-section{{font-size:16px;font-weight:800;color:#0f172a;background:#e8f1fb;border-left:4px solid #2563eb;border-radius:6px;padding:10px 13px;margin:30px 0 16px;letter-spacing:0}}
  .subsection-title{{font-size:13px;font-weight:750;color:#334155;background:#f6f8fb;border-left:3px solid #cbd5e1;border-radius:5px;padding:7px 10px;margin:24px 0 12px;letter-spacing:0}}
  .section-title{{font-size:13px;font-weight:750;color:#334155;background:#f6f8fb;border-left:3px solid #cbd5e1;border-radius:5px;padding:7px 10px;margin:24px 0 12px;letter-spacing:0}}
  .bullet{{font-size:14px;line-height:1.7;color:#475569;margin:8px 0;padding-left:16px;position:relative}}
  .bullet::before{{content:"▸";position:absolute;left:0;color:#3b82f6;font-size:10px;line-height:1.7}}
  .footer{{text-align:center;padding:20px 32px 36px;background:#f6f7f9;font-size:10px;color:#94a3b8;border-top:1px solid #e5eaf0}}
</style>
</head>
<body>
<div class="header">
  <h1>{title}</h1>
  <div class="date">{date_str} · {weekday}</div>
</div>
<div class="content">
{body}
</div>
<div class="footer">{footer}</div>
</body>
</html>
