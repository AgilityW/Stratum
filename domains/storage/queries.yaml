# Storage Domain - Search Queries
# Placeholders: ${CURRENT_YEAR}, ${CURRENT_MONTH_EN}, ${CURRENT_MONTH_ZH}
#
# Structure:
#   queries:
#     intent:
#       dimension:
#         locale:
#           - query
#
# intent describes the search job; dimension describes the briefing coverage
# surface. Search flattens this to {id, text, locale, intent, dimension}.
# Use include_domains for source-scoped searches instead of embedding engine
# operators such as site: in the query text.

