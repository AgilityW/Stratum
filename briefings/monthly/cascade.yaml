# Monthly Cascade — Consume daily + weekly judgments for backtesting

fresh_search:
  window: 30 days
  queries_from: manifest.yaml

consume:
  - scale: daily
    window: 30 days
    data:
      - judgments               # all daily judgments → backtest accuracy
  - scale: weekly
    window: 4 weeks
    data:
      - trend_judgments         # weekly trend judgments → verify
      - coverage_reports        # weekly coverage → identify systemic gaps

produce:
  output:
    - briefing.md
    - judgment_corrections.json
  feed_to:
    - quarterly
    - entity-store

feedback:
  - to: edit prompt system
    signal: bias_correction
  - to: entity-store
    signal: stale_entities
