# Manifest: Timescale → template, output schema, and edit budget declaration.
# edit.py reads this to drive Edit v3 block planning/rendering.
# validate.py reads this to locate schemas for validation.

daily:
  label: "日报"
  description: "24h 雷达，16-18 条主线 + 5-8 条边缘信号，信号前置，因果链产出"
  system:
    template: daily.md
  output:
    threads:
      enabled: true
      schema: _schemas/event_thread.schema.json
    causal_edges:
      enabled: true
      schema: _schemas/causal_edge.schema.json
    judgments:
      enabled: true
      schema: _schemas/judgment.schema.json
  budget:
    max_items: 24
    min_items: 16
    main_max_items: 18
    main_min_items: 12
    edge_max_items: 8
    edge_min_items: 3
    target_main_items: 16
    target_edge_items: 6
    block_parallelism: 4
    evidence_articles_per_item: 2
    max_categories: 18
    max_main_per_category: 3
    edit_mode: v3

weekly:
  label: "周报"
  description: "周度趋势聚合，区分 signal vs noise，判断复查"
  system:
    template: weekly.md
  output:
    causal_edges:
      enabled: false
      schema: null
    judgments:
      enabled: false
      schema: null
  budget:
    max_items: 15
    min_items: 8
    main_max_items: 12
    main_min_items: 6
    edge_max_items: 4
    edge_min_items: 1
    target_main_items: 10
    target_edge_items: 3
    block_parallelism: 4
    evidence_articles_per_item: 3
    max_categories: 10
    max_main_per_category: 3
    edit_mode: v3

monthly:
  label: "月报"
  description: "月度复盘：假设验证、判断修正"
  system:
    template: monthly.md
  output:
    causal_edges:
      enabled: false
      schema: null
    judgments:
      enabled: false
      schema: null
  budget:
    max_items: 12
    min_items: 6
    main_max_items: 10
    main_min_items: 5
    edge_max_items: 3
    edge_min_items: 0
    target_main_items: 8
    target_edge_items: 2
    block_parallelism: 4
    evidence_articles_per_item: 4
    max_categories: 8
    max_main_per_category: 3
    edit_mode: v3

quarterly:
  label: "季报"
  description: "季度审视：结构性变化识别 + 长期判断生成"
  system:
    template: quarterly.md
  output:
    causal_edges:
      enabled: true
      schema: _schemas/causal_edge.schema.json
    judgments:
      enabled: true
      schema: _schemas/judgment.schema.json
  budget:
    max_items: 12
    min_items: 6
    main_max_items: 10
    main_min_items: 5
    edge_max_items: 3
    edge_min_items: 0
    target_main_items: 8
    target_edge_items: 2
    block_parallelism: 4
    evidence_articles_per_item: 5
    max_categories: 8
    max_main_per_category: 3
    edit_mode: v3

yearly:
  label: "年报"
  description: "年度叙事线 + 元判断"
  system:
    template: yearly.md
  output:
    causal_edges:
      enabled: false
      schema: null
    judgments:
      enabled: true
      schema: _schemas/judgment.schema.json
  budget:
    max_items: 14
    min_items: 6
    main_max_items: 12
    main_min_items: 5
    edge_max_items: 3
    edge_min_items: 0
    target_main_items: 9
    target_edge_items: 2
    block_parallelism: 4
    evidence_articles_per_item: 6
    max_categories: 9
    max_main_per_category: 3
    edit_mode: v3
