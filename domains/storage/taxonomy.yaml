# Storage domain taxonomy — controlled vocabulary for topic_tags and entity_tags.
#
# Used by the agent to normalize tags before event creation.
# Query engine does case-insensitive matching on the ID and aliases.
#
# Format:
#   topics:
#     - id: unique-kebab-case
#       label: Human-readable name
#       aliases: [alternative names, abbreviations]
#       parent: parent_topic_id (optional, for hierarchy)
#       description: Brief explanation
#   entities:
#     - id: unique-kebab-case
#       label: Human-readable name
#       type: company | person | technology | product
#       aliases: [alternative names, abbreviations, local-language names]
#       parent: parent_entity_id (optional)

topics:
  # ── Memory Technologies ──
  - id: hbm
    label: "HBM (High Bandwidth Memory)"
    aliases: ["HBM3", "HBM3E", "HBM4", "High Bandwidth Memory"]
    parent: memory-interface
    description: "Stacked DRAM for AI/HPC — Samsung, SK Hynix, Micron competing"

  - id: ddr5
    label: "DDR5"
    aliases: ["DDR5 SDRAM", "server DDR5", "client DDR5"]
    parent: memory-interface
    description: "Mainstream DRAM standard — server/PC migration from DDR4"

  - id: lpddr
    label: "LPDDR"
    aliases: ["LPDDR5", "LPDDR5X", "LPDDR6", "mobile DRAM"]
    parent: memory-interface
    description: "Low-power DRAM for mobile/edge — Apple, Qualcomm, MediaTek"

  - id: gddr
    label: "GDDR"
    aliases: ["GDDR6", "GDDR6X", "GDDR7", "graphics memory"]
    parent: memory-interface
    description: "Graphics DRAM — NVIDIA, AMD GPUs"

  - id: memory-interface
    label: "Memory Interface Technologies"
    aliases: ["DRAM interface", "memory standards"]
    description: "Parent: DRAM interface standards (HBM, DDR5, LPDDR, GDDR)"

  - id: nand
    label: "NAND Flash"
    aliases: ["3D NAND", "NAND flash", "QLC NAND", "TLC NAND", "NAND pricing"]
    parent: storage-media
    description: "NAND flash memory — Samsung, SK Hynix, Micron, Kioxia, WDC, YMTC"

  - id: storage-media
    label: "Storage Media"
    aliases: ["flash memory", "storage class"]
    description: "Parent: NAND + emerging storage media"

  # ── Industry Dynamics ──
  - id: capex
    label: "CapEx & Fab Investment"
    aliases: ["capital expenditure", "fab construction", "wafer capacity"]
    description: "Capital expenditure and fab expansion plans"

  - id: supply-chain
    label: "Supply Chain"
    aliases: ["equipment", "materials", "substrate", "ABF", "wafer supply"]
    description: "Semiconductor equipment, materials, substrate supply"

  - id: geopolitics
    label: "Geopolitics & Trade"
