# ── Gap Searches ──
# Adversarial verification — queries designed to catch what main search might miss.
# ${CURRENT_MONTH_EN} / ${CURRENT_YEAR} / ${CURRENT_MONTH_ZH} substituted at runtime.
gap_searches:
  - query: "Samsung SK hynix Micron latest ${CURRENT_MONTH_EN} ${CURRENT_YEAR}"
    locale: en
  - query: "Kioxia Western Digital WDC SanDisk latest ${CURRENT_MONTH_EN} ${CURRENT_YEAR}"
    locale: en
  - query: "NAND flash DRAM price ${CURRENT_MONTH_EN} ${CURRENT_YEAR}"
    locale: en
  - query: "YMTC CXMT 长江存储 长鑫存储 最新 ${CURRENT_YEAR}年${CURRENT_MONTH_ZH}"
    locale: zh-CN
  - query: "SK hynix iHBM cooling technology ${CURRENT_MONTH_EN} ${CURRENT_YEAR}"
    locale: en
  - query: "Samsung V-NAND CMB prototype ${CURRENT_MONTH_EN} ${CURRENT_YEAR}"
    locale: en
  - query: "Pure Storage NetApp Dell enterprise storage AI ${CURRENT_MONTH_EN} ${CURRENT_YEAR}"
    locale: en

# ── Platform Companies ──
# Companies outside storage whose technology directly affects memory/storage architecture.
# Content from these passes admission test if it changes storage/memory landscape judgment.
platform_companies:
  - nvidia
  - marvell

# ── Value Chain Exploration ──
# 十一层探测模型。每层定义探测逻辑、信源种子、查询模板、覆盖告警阈值。
# value-chain-monitor skill 读取此配置执行主动探测。
# 跨行业复用：只需替换此 section，框架逻辑不变。

value_chain:
  layers:
    # ── Layer 1: 上游设备/材料 ──
    - id: upstream_equipment
      label: 上游设备/材料
      question: 能不能造？
      criticality: critical
      frequency: weekly
      coverage_alert_weeks: 2
      seed_sources:
        - name: ASML
          aliases: {zh-CN: "阿斯麦"}
        - name: Lam Research
          aliases: {zh-CN: "泛林半导体"}
        - name: Tokyo Electron
          aliases: {zh-CN: "东京电子", ja: "東京エレクトロン"}
        - name: SUMCO
          aliases: {zh-CN: "胜高"}
        - name: 东京应化
          aliases: {en: "TOK"}
      watch_patterns:
        - EUV 分配给 memory 客户的比例变化
        - 刻蚀/沉积设备 lead time 变化
        - 硅片/光刻胶涨价公告
        - 新产能投资
      probe_templates:
        - "ASML EUV allocation memory DRAM {year}"
        - "Lam Research equipment lead time semiconductor {quarter}"
        - "silicon wafer price increase {year}"
        - "semiconductor equipment capex expansion {quarter}"
      gap_indicators:
        - "4周无设备交期更新"
        - "2周无产能投资公告"

    # ── Layer 2: 中间信号节点 ──
    - id: mid_signal_proxy
      label: 中间信号节点
      question: 拐点到了吗？
      criticality: high
      frequency: weekly
      coverage_alert_weeks: 2
      seed_sources:
        - name: Phison
          aliases: {zh-CN: "群联电子"}
        - name: Silicon Motion
          aliases: {zh-CN: "慧荣科技"}
        - name: Kingston
          aliases: {zh-CN: "金士顿"}
        - name: ADATA
          aliases: {zh-CN: "威刚科技"}
      watch_patterns:
        - SSD 控制器库存堆积
        - 模组厂毛利率压缩
        - 现货价 vs 合约价 价差扩大
      probe_templates:
        - "{company} inventory NAND SSD controller {quarter}"
        - "{company} gross margin memory module {quarter}"
        - "DRAM spot price vs contract price {month}"
      gap_indicators:
        - "2周无控制器/模组厂库存更新"

    # ── Layer 3: 下游需求 ──
    - id: downstream_demand
      label: 下游需求
      question: 谁会买？
      criticality: critical
      frequency: weekly
      coverage_alert_weeks: 3
      seed_sources:
        - name: AWS
          aliases: {zh-CN: "亚马逊云"}
        - name: Microsoft Azure
          aliases: {zh-CN: "微软云"}
        - name: Google Cloud
          aliases: {zh-CN: "谷歌云"}
        - name: NVIDIA
          aliases: {zh-CN: "英伟达"}
        - name: Apple
        - name: Tesla
      watch_patterns:
        - 云厂商 capex 指引变化
        - 自研存储控制器/芯片
        - GPU 内存规格升级
        - 消费电子 NAND tier 升级
      probe_templates:
        - "{company} capex cloud infrastructure {quarter}"
        - "{company} custom storage controller silicon chip"
        - "NVIDIA GPU HBM memory specification roadmap {year}"
      gap_indicators:
        - "3周无 hyperscaler capex 更新"

    # ── Layer 4: 配套/互联 ──
    - id: packaging_interconnect
      label: 配套/互联
      question: 怎么被消费？
      criticality: high
      frequency: biweekly
      coverage_alert_weeks: 4
      seed_sources:
        - name: TSMC
          aliases: {zh-CN: "台积电"}
      watch_patterns:
        - CoWoS 产能分配给 HBM 客户
        - CXL 3.0 规范进度
        - HBM 散热/堆叠方案突破
      probe_templates:
        - "TSMC CoWoS capacity allocation HBM {quarter}"
        - "CXL memory pooling deployment hyperscaler {year}"
        - "HBM thermal management cooling solution stack"
      gap_indicators:
        - "4周无先进封装产能更新"

    # ── Layer 5: 替代威胁 ──
    - id: substitute_threat
      label: 替代威胁
      question: 会不会被换掉？
      criticality: medium
      frequency: monthly
      coverage_alert_weeks: 8
      seed_sources:
        - name: Mythic
        - name: Untether AI
      watch_patterns:
        - 存算一体芯片 benchmark
        - CXL 内存池化商用部署
        - 持久内存/SCM 进展
      probe_templates:
        - "processing-in-memory benchmark performance {year}"
        - "CXL memory pooling production deployment"
        - "storage class memory SCM persistent memory progress"
      gap_indicators:
        - "8周无替代技术进展"

    # ── Layer 6: 竞争对手 (已有日频管线覆盖) ──
    - id: competitors
      label: 竞争对手
      question: 别人在干什么？
      criticality: critical
      frequency: daily
      coverage_alert_weeks: 1
      seed_sources: []
      watch_patterns:
        - 产能公告/调整
        - 技术路线图更新
        - 产品发布
        - 财务/经营异常
      probe_templates: []
      gap_indicators:
        - "1周无竞争动态 — 已有日频管线覆盖"
      note: "covered by daily pipeline; value-chain-monitor only logs coverage"

    # ── Layer 7: 地缘/管制 ──
    - id: geopolitics
      label: 地缘/管制
      question: 游戏规则变了吗？
      criticality: critical
      frequency: weekly
      coverage_alert_weeks: 4
      seed_sources:
        - name: BIS
          aliases: {zh-CN: "美国工业安全局"}
        - name: 日本经产省
          aliases: {en: "METI"}
        - name: CHIPS Program Office
      watch_patterns:
        - 实体清单更新
        - 出口管制新规
        - CHIPS Act 拨款/补贴
        - 日本/荷兰 设备管制
      probe_templates:
        - "BIS entity list semiconductor China {date}"
        - "export control semiconductor equipment Japan Netherlands"
        - "CHIPS Act funding allocation memory DRAM NAND"
      gap_indicators:
        - "4周无管制/政策更新"

    # ── Layer 8: 标准组织 ──
    - id: standards
      label: 标准组织
      question: 技术路线锁定了吗？
      criticality: medium
      frequency: monthly
      coverage_alert_weeks: 12
      seed_sources:
        - name: JEDEC
        - name: PCI-SIG
        - name: CXL Consortium
      watch_patterns:
        - DDR6/PCIe Gen6/CXL 3.0 规范定稿
        - 新工作组组建
      probe_templates:
        - "JEDEC DDR6 standard specification finalization"
        - "CXL 3.0 specification release date"
        - "PCIe Gen6 specification memory storage"
      gap_indicators:
        - "12周无标准更新"

    # ── Layer 9: 物理基础设施 ──
    - id: physical_infrastructure
      label: 物理基础设施
      question: 产线能跑吗？
      criticality: high
      frequency: weekly
      coverage_alert_weeks: null
      seed_sources: []
      watch_patterns:
        - 台湾/韩国/日本 限电/停电
        - 地震影响半导体产线
        - 缺水
        - 物流/航运中断
        - 劳工行动/罢工
      probe_templates:
        - "Taiwan power shortage TSMC semiconductor fab"
        - "earthquake semiconductor fab Taiwan Japan Korea"
        - "water shortage semiconductor manufacturing"
        - "Red Sea shipping disruption semiconductor equipment"
        - "Samsung semiconductor labor strike union"
      gap_indicators:
        - "事件驱动层 — 无事件=无覆盖=正常"
      note: "event-driven: no gap alert when quiet"

    # ── Layer 10: 客户健康 ──
    - id: customer_health
      label: 客户健康
      question: 需求信号可信吗？
      criticality: high
      frequency: weekly
      coverage_alert_weeks: 4
      seed_sources:
        - name: AWS
        - name: Microsoft
        - name: Google
        - name: Apple
        - name: Tesla
      watch_patterns:
        - 云客户流失/份额下降
        - 消费电子销量下滑
        - 电动车交付不及预期
      probe_templates:
        - "{company} revenue miss cloud customer loss {quarter}"
        - "{company} iPhone sales forecast downgrade"
        - "{company} vehicle delivery decline Q{quarter}"
      gap_indicators:
        - "探测的是坏消息 — 连续4周无覆盖=客户健康假设成立"

    # ── Layer 11: 人才流动 ──
    - id: talent_flow
      label: 人才流动
      question: 技术能力在往哪流？
      criticality: medium
      frequency: monthly
      coverage_alert_weeks: 12
      seed_sources: []
      watch_patterns:
        - DRAM/HBM 核心工程师跳槽
        - 高管更换
        - 招聘公告揭示技术方向
      probe_templates:
        - "DRAM engineer Samsung SK hynix Micron hires CXMT YMTC"
        - "semiconductor VP memory departure hire"
        - "CXMT YMTC hiring EUV DRAM engineer"
      gap_indicators:
        - "12周无人才流动信号"

# ═══════════════════════════════════════════════════════════════
# Pipeline Configuration
# ═══════════════════════════════════════════════════════════════
# All hardcoded domain knowledge from pipeline stages extracted here.
# Framework stages read this; no domain logic in stage code.
# ═══════════════════════════════════════════════════════════════

pipeline:
  # ── Verify Stage: Search Blocklist ──
  # Domains that should never appear in search results.
  blocklist:
    social:
      - youtube.com
      - youtu.be
      - reddit.com
      - threads.com
      - threads.net
      - facebook.com
      - fb.com
      - twitter.com
      - x.com
      - instagram.com
      - tiktok.com
    encyclopedia:
      - wikipedia.org
      - namu.wiki
      - baike.baidu.com
    ecommerce:
      - amazon.com
      - amazon.co.jp
      - jd.com
      - taobao.com
    qa_forums:
      - quora.com
      - zhidao.baidu.com
      - zhihu.com
    job_boards:
      - linkedin.com
      - indeed.com

  # Domains that are valid but low priority (search engines, not content)
  low_priority_domains:
    - bing.com
    - google.com

  # ── Verify Stage: Magnitude Sanity Rules ──
  magnitude_rules:
    revenue_max_usd: 1000000000000    # $1T flag
    share_max_pct: 100                 # 100% reject (mathematically impossible)
    growth_max_pct: 1000               # 1000% YoY flag
    chip_price_max_usd: 10000          # $10K flag

  # ── Verify Stage: Date Window ──
  date_window:
    stale_days: 2                      # Articles older than this rejected
    max_future_days: 1                 # Future-dated articles beyond this rejected

  # ── Verify Stage: Rejection Codes ──
  rejection_codes:
    BLOCKED: "Domain in search blocklist"
    NO_DATE: "No publication date found in metadata or content"
    STALE: "Article older than 2 days"
    FUTURE: "Article date is in the future"
    LOW_SIGNAL: "Domain is low-priority (search engine, aggregator)"
    IMPOSSIBLE: "Value violates physical/mathematical constraints"

  # ── Normalize Stage: Source Type Classification ──
  source_classification:
    official:
      - samsung.com
      - news.skhynix.com
      - skhynix.com
      - micron.com
      - cxmt.com
      - ymte.com
      - ymtc.com
      - kioxia.com
      - kioxia-holdings.com
      - westerndigital.com
      - intel.com
      - amd.com
      - nvidia.com
      - tsmc.com
      - apple.com
      - huawei.com
      - mediatek.com
    analyst:
      - trendforce.com
      - icinsights.com
      - counterpointresearch.com
      - gartner.com
      - idc.com
      - yolegroup.com
      - yole.fr
      - chinaflashmarket.com
      - semiengineering.com
      - semianalysis.com
      - semi.org
      - dramexchange.com
      - cfm闪存市场
    media:
      - reuters.com
      - bloomberg.com
