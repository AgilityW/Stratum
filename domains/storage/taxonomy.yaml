    description: "Trade restrictions, export controls, subsidies"

  - id: pricing
    label: "Pricing Trends"
    aliases: ["spot price", "contract price", "ASP", "DRAM price", "NAND price"]
    description: "Memory pricing dynamics (spot and contract)"

  # ── Applications ──
  - id: ai-hpc
    label: "AI & HPC"
    aliases: ["artificial intelligence", "GPU", "NVIDIA", "accelerator", "training"]
