# ═══════════════════════════════════════════════════════════════
# Source Registry — Per-Domain Source Definitions
# ═══════════════════════════════════════════════════════════════
# Domain-scoped: storage sources ≠ robot sources.
# Each source has an access pattern (how to fetch) and lifecycle status.
# Collector reads this at runtime; search engines handle the rest.
source_registry:
  sources:
    # ── Manufacturer Newsrooms (direct_fetch) ──
    - id: micron-newsroom
      name: "Micron News Releases"
      urls:
        - "https://www.micron.com/about/press/news"
      access: direct_fetch
      locale: en
      category: newsroom
      fetch_interval_hours: 24
      status: active
      suppress_search: true
      max_articles: 10
      timeout: 30

    - id: skhynix-newsroom
      name: "SK hynix Newsroom"
      urls:
        - "https://news.skhynix.com"
      access: direct_fetch
      locale: en
      category: newsroom
      fetch_interval_hours: 24
      status: active
      suppress_search: true

    - id: micron-blog
      name: "Micron Technical Blog"
      urls:
        - "https://www.micron.com/about/blog"
      access: direct_fetch
      locale: en
      category: blog
      fetch_interval_hours: 24
      status: active
      suppress_search: true

    - id: wd-blog
      name: "Western Digital Corporate Blog"
      urls:
        - "https://blog.westerndigital.com"
      access: direct_fetch
      locale: en
      category: blog
      fetch_interval_hours: 24
      status: active
      suppress_search: true

    - id: wd-newsroom
      name: "Western Digital Newsroom"
      urls:
        - "https://www.westerndigital.com/company/newsroom"
      access: browser
      locale: en
      category: newsroom
      fetch_interval_hours: 24
      status: active
      note: "Corp CMS; needs browser for article extraction"

    # ── JS-rendered newsrooms (browser — deferred) ──
    - id: samsung-semiconductor-newsroom
      name: "Samsung Semiconductor Newsroom"
      urls:
        - "https://semiconductor.samsung.com/newsroom/"
      access: browser
      locale: en
      category: newsroom
      fetch_interval_hours: 24
      status: active
      note: "JS-rendered; requires browser_navigate"

    - id: kioxia-newsroom
      name: "Kioxia Americas Newsroom"
      urls:
        - "https://americas.kioxia.com/en-us/news.html"
      access: browser
      locale: en
      category: newsroom
      fetch_interval_hours: 24
      status: inactive
      note: "List page hides article dates (same as blog). Needs per-page browser scraping."

    # ── Manufacturer Technical Blogs ──
    - id: samsung-tech-blog
      name: "Samsung Semiconductor Tech Blog"
      urls:
        - "https://semiconductor.samsung.com/news-events/tech-blog/"
      access: browser
      locale: en
      category: blog
      fetch_interval_hours: 24
      status: active
      note: "JS-rendered; requires browser_navigate"

    - id: kioxia-blog
      name: "Kioxia Technical Blog"
      urls:
        - "https://americas.kioxia.com/en-us/insights.html"
      access: direct_fetch
      locale: en
      category: blog
      fetch_interval_hours: 24
      status: inactive
      note: "List page hides article dates — verify stage always rejects. Needs browser per-page scraping."

    - id: servethehome-rss
      name: "ServeTheHome RSS"
      urls:
        - "https://www.servethehome.com/feed/"
      access: rss
      locale: en
      category: media
      fetch_interval_hours: 12
      status: active

    - id: storagenewsletter-rss
      name: "StorageNewsletter RSS"
      urls:
        - "https://www.storagenewsletter.com/feed/"
      access: rss
      locale: en
      category: media
      fetch_interval_hours: 12
      status: active

    - id: eetimes-rss
      name: "EE Times RSS"
      urls:
        - "https://www.eetimes.com/feed/"
      access: rss
      locale: en
      category: media
      fetch_interval_hours: 12
      status: active

    - id: semiengineering-rss
      name: "SemiEngineering RSS"
      urls:
        - "https://semiengineering.com/feed/"
      access: rss
      locale: en
      category: media
      fetch_interval_hours: 12
      status: active

  # ── Per-access-type settings ──
  defaults:
    direct_fetch:
      max_articles_per_url: 10
      timeout_seconds: 15
      user_agent: "Stratum/1.0 (storage industry monitor)"
    browser:
      max_articles_per_url: 5
      timeout_seconds: 30

# ═══════════════════════════════════════════════════════════════
# Editorial Configuration
# ═══════════════════════════════════════════════════════════════

editorial:
  platform_admission:
    companies:
      - nvidia
      - marvell
    test: "Does this change judgment about memory bandwidth, interconnect, compute-storage ratio, or power budget?"
    rule: "YES = admit. NO = reject as IRRELEVANT."
  impact_tags:
    - price
    - customer
    - supply
    - technology
    - competitor
    - capital
    - policy
  content_routing:
    threads:
      - id: ai_hbm_squeeze
        label: "AI/HBM Structural Squeeze"
        topics:
          - "HBM/DDR5/eSSD supply-demand"
          - "AI GPU storage demand"
          - "AI-driven price increase"
      - id: capacity_lockin
        label: "Capacity Lock-in and Pricing Power"
        topics:
          - "Vendor tech roadmap"
          - "Capacity expansion/cut"
          - "Long-term supply agreements"
          - "Equipment/wafer constraints"
      - id: china_inflection
        label: "China Storage Inflection"
        topics:
          - "CXMT/YMTC"
          - "China storage policy"
          - "Domestic equipment"
          - "IPO"
    other_max_items: 5
    supplement_window: "24-48h"
    background_window: ">48h"
  domestic_coverage:
    locales:
      - zh-CN
      - zh-TW
    guidance: "Shift from narrative to business judgment. Probe AVL status, yield rates, volume, customer qualification."

  # ── Render Stage: Content Tag Detection ──
  # Keywords → (label, css_class) for visual tags in HTML/PDF output.
  render_tags:
    new:
      label: new
      class: tag-new
      keywords: [announce, launch, release, unveil, debut, 推出, 发布, 発表]
    tech:
      label: tech
      class: tag-tech
      keywords: [nm, layer, process, architecture, 制程, 工艺, 堆叠]
    supply:
      label: supply
      class: tag-supply
      keywords: [capacity, expansion, fab, plant, 扩产, 产能, 晶圆厂]
    price:
      label: price
      class: tag-price
      keywords: [price, hike, shortage, 涨价, 价格]
