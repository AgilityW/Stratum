# Quarterly Cascade — Identify structural changes, generate long-term judgments

fresh_search:
  window: 90 days
  queries_from: manifest.yaml

consume:
  - scale: monthly
    window: 3 months
    data:
      - judgment_corrections    # systematic bias patterns
  - scale: daily
    window: 90 days
    data:
      - causal_edges            # full causal graph for the quarter
      - judgments               # all judgments for structural analysis

produce:
  output:
    - briefing.md
    - structural_judgments.json
  feed_to:
    - yearly
    - entity-store
    - source-profiler

feedback:
  - to: source-profiler
    signal: structural_sensitivity
  - to: entity-store
    signal: importance_rebalance
  - to: query-manager
    signal: emerging_terms
