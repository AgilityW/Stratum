# ============================================================
# Stratum — Configuration
# ============================================================
# Copy to config.yaml and edit. config.yaml is .gitignore'd.
#
# Clone → cp config.example.yaml config.yaml → edit → ./install.sh --dev

# ── Source languages: which languages to monitor ──
# BCP 47 locale tags. Umbrella tags auto-expand:
#   zh  → zh-CN + zh-TW
# Available: zh, zh-CN, zh-TW, en, ja, ko, fr, de, es, ...
source_languages:
  - zh
  - en
  - ja
  - ko

# ── Locale expansion rules ──
locales:
  zh: [zh-CN, zh-TW]

# ── Output languages ──
output_languages:
  - zh-CN

# ── Search engine registry ──
engines:
  bocha:
    label: "Bocha AI (Chinese/Asian)"
    languages: [zh-CN, zh-TW]
    endpoint: "https://api.bocha.cn/v1/web-search"
    auth: "Bearer ${BOCHA_API_KEY}"
    freshness: {param: "freshness", day: "oneDay", week: "oneWeek"}
    response_path: "data.webPages.value"
    has_date: true
    date_field: "datePublished"
    title_field: "name"
    url_field: "url"
    snippet_field: "snippet"

  tavily:
    label: "Tavily (English/Global)"
    languages: [en, ja, ko, fr, de, es, pt, it, nl, sv, no, da, fi]
    endpoint: "https://api.tavily.com/search"
    auth: "api_key: ${TAVILY_API_KEY}"
    extra: {topic: "news", search_depth: "advanced"}
    freshness: {param: "time_range", day: "day", week: "week"}
    response_path: "results"
    has_date: false
    title_field: "title"
    url_field: "url"
    snippet_field: "content"

# ── Output Format ──
# Reference template for the Agent Edit stage. Runtime Edit templates live in
# stratum/stages/edit/templates/; keep this example aligned with the active
# daily chunk names.
# Placeholders: {{ title }}, {{ date_label }}, {{ summary }},
# {{ main_categories }}, {{ edge_items }}, {{ focus }}, {{ contrarian }}
output_format:
  zh-CN: |
    # {{ title }}
    ## {{ date_label }}

    ## 今日要点

    {{ summary }}

    ---

    ## 行业要点

    {{ main_categories }}

    ---

    ## 产业信号

    {{ edge_items }}

    ---

    ## 特别关注

    {{ focus }}

    ## 反向信号

    {{ contrarian }}

    ---

    *由 AI Agent 自动生成 · 每日 7:30 CST*

# ── LLM ──
# Model for Agent Edit stage. Uses DeepSeek API (OpenAI-compatible).
# Set DEEPSEEK_API_KEY in .env or environment.
llm:
  provider: "deepseek"
  api_key: "${DEEPSEEK_API_KEY}"
  endpoint: "https://api.deepseek.com/v1/chat/completions"
  model: "deepseek-v4-pro"

# ── Runtime roots (edit for your machine) ──
# `reports_dir` is the artifact store: Markdown, HTML, PDF, raw/stage sidecars,
# and run manifests are written under {reports_dir}/{domain}/data/...
# `db_dir` is the state store: SQLite lives under {db_dir}/{domain}/{domain}.db.
# Keep reports_dir and db_dir separate so report retention, DB backups,
# migrations, and production permissions can be managed independently.
output_dir: "$HOME/stratum"
reports_dir: "$HOME/stratum/reports"
db_dir: "$HOME/stratum/db"
health_data_dir: "$HOME/stratum/health"
chrome_path: "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome"

# ── Deployment defaults ──
# Deployment is separate from development. Production runs should be launched
# through scripts/run_deployed_daily.sh from a tag-locked release directory.
deployment:
  root: "$HOME/stratum/deployments"
  environment: "production"
